# ============================================================
# dev.properties - local development environment
# Loaded when: mvn test  OR  mvn test -Denv=dev
# ============================================================

# Spotify API base URL
base.url=https://api.spotify.com/v1

# Spotify Accounts Service (token endpoint)
auth.base.url=https://accounts.spotify.com

# Auth strategy: oauth2_pkce | basic | api_key
auth.type=oauth2_pkce

# OAuth2 endpoints
auth.token.path=/api/token
auth.authorize.path=/authorize

# Spotify OAuth2 scopes needed for playlist operations
# Full list: https://developer.spotify.com/documentation/web-api/concepts/scopes
auth.scopes=playlist-read-private playlist-read-collaborative playlist-modify-public playlist-modify-private

# Client credentials - loaded from env vars at runtime, NOT hardcoded here
# Set these in your shell before running:
#   export SPOTIFY_CLIENT_ID=your_client_id
#   export SPOTIFY_CLIENT_SECRET=your_client_secret
#   export SPOTIFY_REFRESH_TOKEN=your_refresh_token
auth.client.id=${SPOTIFY_CLIENT_ID}
auth.client.secret=${SPOTIFY_CLIENT_SECRET}
auth.refresh.token=${SPOTIFY_REFRESH_TOKEN}

# Your Spotify user ID (needed for Create Playlist endpoint)
# Set: export SPOTIFY_USER_ID=your_spotify_user_id
spotify.user.id=${SPOTIFY_USER_ID}

# Token cache TTL in seconds (Spotify access tokens last 3600s)
auth.token.ttl.seconds=3500

# HTTP timeouts (milliseconds)
http.connect.timeout.ms=10000
http.read.timeout.ms=30000

# Response time SLA assertion (milliseconds) - fail if API responds slower
response.time.sla.ms=3000

# Retry config
retry.count=2
retry.delay.ms=1000

# Extent Reports output path
report.output.path=target/reports/extent-report.html

# Log level: TRACE | DEBUG | INFO | WARN | ERROR
log.level=DEBUG

# Log request/response for ALL calls (true) or only on failure (false)
log.all.requests=false