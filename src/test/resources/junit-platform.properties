# ============================================================
# junit-platform.properties
# Controls Cucumber + JUnit5 parallel execution behaviour
# ============================================================

# Enable parallel scenario execution
cucumber.execution.parallel.enabled=true

# dynamic = thread count scales with available CPU cores
# fixed   = exact thread count (set via cucumber.execution.parallel.config.fixed.parallelism)
cucumber.execution.parallel.config.strategy=dynamic

# dynamic.factor: threads = CPU cores * factor
# 1.0 = one thread per core (safe default)
# Overridden in CI profile via -DthreadCount (Surefire forkCount)
cucumber.execution.parallel.config.dynamic.factor=1.0

# Glue - where Cucumber looks for step definitions and hooks
cucumber.glue=com.spotify.tests.steps,com.spotify.tests.hooks

# Feature files location
cucumber.features=src/test/resources/features

# Plugins - console output + HTML report + rerun file for failed scenarios
cucumber.plugin=pretty,\
  html:target/reports/cucumber-report.html,\
  json:target/reports/cucumber-report.json,\
  rerun:target/rerun.txt

# Tags - overridden at runtime via -Dcucumber.filter.tags="@smoke"
# Default: run everything not tagged @wip
cucumber.filter.tags=not @wip

# Publish report to cucumber.io (set to true if you have a licence)
cucumber.publish.enabled=false
cucumber.publish.quiet=true